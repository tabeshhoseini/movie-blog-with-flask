<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Blog</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <div class="container">
        <header>
            <h1>✍️ Edit Blog</h1>
            <a href="{{ url_for('index') }}" class="btn btn-cancel">← Back to Blogs</a>
        </header>

        <div class="blog-form-container">
            <form id="blogForm" action="{{url_for('update_blog' , id=movie.id)}}" method="POST">
                <div class="form-group">
                    <label for="movieTitle">Movie Title *</label>
                    <input type="text" id="movieTitle" name="movie_title" required value="{{ movie.title }}">
                </div>

                <div class=" form-group">
                    <label for="director">Director *</label>
                    <input type="text" id="director" name="director" required value="{{ movie.director }}">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="year">Release Year</label>
                        <input type="number" id="year" name="year" min="1888" max="2026" value="{{ movie.year }}">
                    </div>
                    <div class="form-group">
                        <label for="rating">Rating (1-5)</label>
                        <input type="number" id="rating" name="rating" min="1" max="5" step="0.5"
                            value="{{movie.rating}}">
                    </div>
                </div>

                <div class="form-group">
                    <label for="blogContent">Your Blog Post *</label>
                    <textarea id="blogContent" name="review" class="rtl-text" required>{{movie.review}}</textarea>
                </div>

                <div class="form-buttons">
                    <button type="submit" class="btn btn-save">Edit Blog</button>
                </div>
            </form>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>

</html>
